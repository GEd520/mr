name: dan_shenqi
description: 蛋的神器 - 一款支持小说、漫画、视频、音频的多媒体阅读器
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  
  provider: ^6.1.1
  
  # HTTP 客户端（OkHttp Dart 等价物）
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # 图片/媒体
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  
  # HTML/Markdown 渲染（Jsoup Dart 等价物）
  flutter_html: ^3.0.0-beta.2
  html: ^0.15.4
  xml: ^7.0.1
  
  # 媒体播放
  video_player: ^2.8.2
  chewie: ^1.7.4
  just_audio: ^0.9.36
  
  # 文件/加密/权限
  archive: ^3.4.10
  crypto: ^3.0.3
  encrypt: ^5.0.1
  permission_handler: ^11.1.0
  file_picker: ^8.0.0
  
  # UI 组件
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # 分享/链接/Markdown
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  flutter_markdown_plus: ^1.0.1

  # Rust FFI 桥接 - 高性能原生计算（正则/解析/加密）
  flutter_rust_bridge: ^2.7.0
  # FFI 基础库
  ffi: ^2.1.3
  # Rust 库加载
  path: ^1.9.0

  # JS 引擎增强 - Node.js 兼容的脚本执行
  flutter_js: ^0.8.2
  # WebView 组件 - 用于 webJs 执行和页面渲染（借鉴 legado 的 BackstageWebView）
  flutter_inappwebview: ^6.1.5
  # JSON 处理
  json_annotation: ^4.9.0
  # TTS 文字转语音
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
    - assets/book_sources/
