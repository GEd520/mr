name: Build & Release

# 触发条件：
# 1. push 到 master → 自动打包测试版（dev）
# 2. 手动触发 → 可选正式版(stable)或测试版(dev)
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_type:
        description: '打包类型'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stable

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: 'stable'
  JAVA_VERSION: '21'

jobs:
  # ===== 版本号计算（共享）=====
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_compact: ${{ steps.version.outputs.version_compact }}
      build_number: ${{ steps.version.outputs.build_number }}
      commit_count: ${{ steps.version.outputs.commit_count }}
      build_date: ${{ steps.version.outputs.build_date }}
      release_type: ${{ steps.release_type.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        run: |
          YY=$(date -u +%y)
          MMDD=$(date -u +%m%d)
          TODAY=$(date -u +%Y-%m-%d)
          COMMIT_COUNT_TODAY=$(git log --oneline --since="${TODAY}T00:00:00Z" --until="${TODAY}T23:59:59Z" | wc -l | tr -d ' ')
          if [ "$COMMIT_COUNT_TODAY" -eq 0 ]; then
            COMMIT_COUNT_TODAY=1
          fi
          TOTAL_COMMITS=$(git rev-list --count HEAD 2>/dev/null || echo 1)
          BUILD_NUMBER=$(date -u +%s)
          VERSION="${YY}.${MMDD}.${COMMIT_COUNT_TODAY}"
          VERSION_COMPACT="${YY}${MMDD}${COMMIT_COUNT_TODAY}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_compact=$VERSION_COMPACT" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT_TODAY" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "=========================================="
          echo "  版本号: $VERSION"
          echo "  紧凑号: $VERSION_COMPACT"
          echo "  构建号: $BUILD_NUMBER"
          echo "  今日提交数: $COMMIT_COUNT_TODAY"
          echo "=========================================="

      - name: Determine Release Type
        id: release_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=dev" >> $GITHUB_OUTPUT
          fi

  # ===== Android APK 打包 =====
  build-android:
    name: Build Android
    needs: prepare
    # 标准 2 核 7GB runner，靠 CMake 6 道内存防线（-fno-lto / -fno-inline / 等）避免 OOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Update Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}+${{ needs.prepare.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Remove Aliyun Mirrors
        run: |
          sed -i '/maven.aliyun.com/d' android/settings.gradle.kts
          sed -i '/maven.aliyun.com/d' android/build.gradle.kts

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target-platform=android-arm64 --obfuscate --split-debug-info=build/symbols
        env:
          # 2 核 runner：CMake/Ninja 并行度 = CPU 核数
          CMAKE_BUILD_PARALLEL_LEVEL: 2

      - name: Analyze APK Size
        run: |
          echo "=== APK 内容分析（按大小排序，Top 30）==="
          unzip -l build/app/outputs/flutter-apk/app-release.apk | sort -rn -k1 | head -30
          echo "=== APK 总大小 ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APK
        id: apk
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          APK_NAME="mr_v${{ needs.prepare.outputs.version_compact }}_${TYPE}_${BUILD_DATE}_arm64.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${APK_NAME}"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "${APK_NAME}"

      - name: Compress APK
        run: |
          APK_NAME="${{ steps.apk.outputs.apk_name }}"
          ZIP_NAME="${APK_NAME%.apk}.zip"
          zip -j "${ZIP_NAME}" "${APK_NAME}"
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mr-android-${{ needs.prepare.outputs.version }}
          path: |
            ${{ steps.apk.outputs.apk_name }}
            ${{ env.zip_name }}
          retention-days: 30

  # ===== iOS 打包（允许失败）=====
  # 修复历史：项目原本用 SPM 模式但 project.pbxproj 没有 Flutter.framework 引用，
  # 导致 Library not loaded: @rpath/Flutter.framework/Flutter 闪退。
  # 现已添加传统 PBXBuildFile 引用 + CI 关闭 SPM 模式确保走传统链接路径。
  build-ios:
    name: Build iOS
    needs: prepare
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Disable Swift Package Manager
        # 项目用传统 Flutter.framework 引用模式（project.pbxproj 已配置 PBXBuildFile）
        # 必须关闭 SPM，否则 Generated.xcconfig 会注入 FLUTTER_FRAMEWORK_SWIFT_PACKAGE_PATH
        # 导致 Xcode 走 SPM 路径但找不到 packageReferences
        run: flutter config --no-enable-swift-package-manager

      - name: Update Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i '' "s/^version:.*/version: ${VERSION}+${{ needs.prepare.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Build Phases
        # 校验修复是否生效：project.pbxproj 必须包含 Embed Frameworks 和 Thin Binary (embed_and_thin)
        # 这两个 phase 负责 Flutter.framework 的嵌入，缺失会导致 Library not loaded 闪退
        run: |
          echo "=== 检查 project.pbxproj 中的 Embed Frameworks phase ==="
          grep -c "Embed Frameworks" ios/Runner.xcodeproj/project.pbxproj || {
            echo "❌ project.pbxproj 缺少 Embed Frameworks phase！"
            exit 1
          }
          echo "=== 检查 project.pbxproj 中的 Thin Binary phase (embed_and_thin) ==="
          grep -c "embed_and_thin" ios/Runner.xcodeproj/project.pbxproj || {
            echo "❌ project.pbxproj 缺少 embed_and_thin 脚本！Flutter.framework 不会被嵌入"
            exit 1
          }
          echo "✅ build phases 完整"
          echo "=== 检查 Generated.xcconfig 是否还有 SPM 字段 ==="
          if grep -q "FLUTTER_FRAMEWORK_SWIFT_PACKAGE_PATH" ios/Flutter/Generated.xcconfig; then
            echo "⚠️ Generated.xcconfig 仍包含 SPM 字段（可能 flutter config 未生效）"
            grep "FLUTTER_FRAMEWORK_SWIFT_PACKAGE_PATH" ios/Flutter/Generated.xcconfig
          else
            echo "✅ SPM 模式已关闭"
          fi

      - name: Install Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Disable Code Signing
        run: |
          cd ios
          # 填入假 Development Team 骗过 Flutter 检查，--no-codesign 会跳过实际签名
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "XXXXXX";/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Verify Flutter.framework Embedded
        # 关键校验：Flutter.framework 必须嵌入 Runner.app/Frameworks/，否则启动闪退
        run: |
          echo "=== Runner.app 目录结构 ==="
          ls -lh build/ios/iphoneos/Runner.app/
          echo "=== Runner.app/Frameworks 目录 ==="
          ls -lh build/ios/iphoneos/Runner.app/Frameworks/ 2>/dev/null || {
            echo "❌ Runner.app/Frameworks 不存在！Flutter.framework 未嵌入"
            exit 1
          }
          echo "=== 检查 Flutter.framework 是否嵌入 ==="
          if [ -d "build/ios/iphoneos/Runner.app/Frameworks/Flutter.framework" ]; then
            echo "✅ Flutter.framework 已嵌入"
            ls -lh build/ios/iphoneos/Runner.app/Frameworks/Flutter.framework/
          else
            echo "❌ Flutter.framework 未嵌入到 Runner.app/Frameworks！"
            exit 1
          fi
          echo "=== Runner 二进制大小 ==="
          ls -lh build/ios/iphoneos/Runner.app/Runner
          echo "=== Runner.app 总大小 ==="
          du -sh build/ios/iphoneos/Runner.app

      - name: Create IPA
        id: ipa
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          IPA_NAME="mr_v${{ needs.prepare.outputs.version_compact }}_${TYPE}_${BUILD_DATE}_ios.ipa"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "${IPA_NAME}" Payload
          echo "ipa_name=${IPA_NAME}" >> $GITHUB_OUTPUT
          ls -lh "${IPA_NAME}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mr-ios-${{ needs.prepare.outputs.version }}
          path: ${{ steps.ipa.outputs.ipa_name }}
          retention-days: 30

  # ===== 鸿蒙 HarmonyOS 打包（允许失败）=====
  # 鸿蒙 Flutter SDK 为华为 fork（https://gitcode.com/openharmony-sig/flutter_flutter）
  # 当前基于 Flutter 3.27.4（Dart 3.6.2），项目要求 Dart >=3.12.0 可能暂不兼容
  # 等华为 fork 更新后再正式启用，暂用 continue-on-error 允许失败
  build-ohos:
    name: Build HarmonyOS
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        # 鸿蒙构建工具 hvigorw 强制要求 JDK 17（与 Android 的 21 不通用）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        # hvigorw 依赖 Node.js 运行时
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache HarmonyOS CLI
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/commandline-tools
          key: ohos-cli-5.0.3

      - name: Download HarmonyOS CLI
        # 鸿蒙命令行工具（commandline-tools-linux-x64-5.0.3.XXX.zip）需自行下载并配置到 secret
        # 下载地址需在仓库 Settings → Secrets 中配置 HARMONYOS_CLI_URL
        if: steps.cache-cli.outputs.cache-hit != 'true'
        run: |
          if [ -z "${{ secrets.HARMONYOS_CLI_URL }}" ]; then
            echo "❌ 未配置 HARMONYOS_CLI_URL secret"
            echo "请到 https://developer.huawei.com/consumer/cn/download/ 下载 commandline-tools-linux-x64 后"
            echo "上传到任意可公开访问的位置，并在仓库 Settings → Secrets 配置 HARMONYOS_CLI_URL"
            exit 1
          fi
          mkdir -p ~/commandline-tools
          wget -q -O /tmp/cli.zip "${{ secrets.HARMONYOS_CLI_URL }}"
          unzip -q /tmp/cli.zip -d ~/commandline-tools
          # 解压后通常有一层 commandline-tools 子目录，需要展平
          if [ -d ~/commandline-tools/commandline-tools ]; then
            mv ~/commandline-tools/commandline-tools/* ~/commandline-tools/
            rmdir ~/commandline-tools/commandline-tools
          fi
          echo "=== 鸿蒙 CLI 目录结构 ==="
          ls ~/commandline-tools/

      - name: Configure HarmonyOS Environment
        run: |
          CLI_HOME="$HOME/commandline-tools"
          echo "OHPM_HOME=$CLI_HOME/ohpm" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$CLI_HOME/sdk" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=$CLI_HOME/sdk" >> $GITHUB_ENV
          echo "$CLI_HOME/bin" >> $GITHUB_PATH
          echo "$CLI_HOME/ohpm/bin" >> $GITHUB_PATH
          echo "$CLI_HOME/hvigor/bin" >> $GITHUB_PATH
          # 验证工具链
          ohpm -v || { echo "❌ ohpm 未找到"; exit 1; }
          hvigorw --version || { echo "❌ hvigorw 未找到"; exit 1; }

      - name: Clone HarmonyOS Flutter SDK
        # 华为 fork 的 Flutter SDK，分支基于 Flutter 3.27.4
        run: |
          git clone --depth 1 https://gitcode.com/openharmony-sig/flutter_flutter.git ~/ohos-flutter
          echo "$HOME/ohos-flutter/bin" >> $GITHUB_PATH

      - name: Enable HarmonyOS Platform
        run: |
          export PATH="$HOME/ohos-flutter/bin:$PATH"
          flutter --version
          flutter config --enable-ohos

      - name: Generate ohos Project
        # 项目仓库未提交 ohos/ 目录，CI 中用华为 fork Flutter 生成
        run: |
          export PATH="$HOME/ohos-flutter/bin:$PATH"
          flutter create --platforms ohos .
          echo "=== ohos 目录结构 ==="
          ls -la ohos/

      - name: Inject QuickJS C Build
        # 将鸿蒙版 CMakeLists.txt 和 version-script 注入 ohos 工程
        # CMakeLists.txt 引用项目根 quickjs/ 源码，编译 libquickjs_c_bridge.so
        # dart:ffi 通过 DynamicLibrary.open('libquickjs_c_bridge.so') 加载
        run: |
          mkdir -p ohos/entry/src/main/cpp
          cp quickjs/ohos/CMakeLists.txt ohos/entry/src/main/cpp/CMakeLists.txt
          cp android/app/src/main/cpp/quickjs_bridge.map ohos/entry/src/main/cpp/quickjs_bridge.map
          echo "=== cpp 目录 ==="
          ls -la ohos/entry/src/main/cpp/

      - name: Configure CMake in build-profile
        # 在 ohos/entry/build-profile.json5 的 entry 模块注入 externalNativeOptions
        # 让 hvigorw 调用 CMake 编译 libquickjs_c_bridge.so
        # 用 python 正则注入，兼容不同版本鸿蒙 Flutter 生成的文件结构
        run: |
          python3 << 'PYEOF'
          import re, sys
          path = 'ohos/entry/build-profile.json5'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          if 'externalNativeOptions' in content:
              print('⚠️ externalNativeOptions 已存在，跳过')
              sys.exit(0)
          # 在 "type": "entry" 前插入 externalNativeOptions
          ext = '''"externalNativeOptions": {
                "path": "./src/main/cpp/CMakeLists.txt",
                "arguments": "",
                "cppFlags": "",
                "abiFilters": ["arm64-v8a"]
              },'''
          new_content = re.sub(r'("type"\s*:\s*"entry")', ext + r'\n            \1', content, count=1)
          if new_content == content:
              print('⚠️ 未找到 "type": "entry"，尝试在 module 配置末尾追加')
              new_content = content.rstrip().rstrip('}') + '  ' + ext.rstrip(',') + '\n}\n'
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_content)
          print('✅ 已注入 externalNativeOptions')
          PYEOF
          echo "=== build-profile.json5 ==="
          cat ohos/entry/build-profile.json5

      - name: Configure ohos Permissions
        # 在 module.json5 加网络权限（书源 HTTP 请求需要）
        run: |
          python3 << 'PYEOF'
          import re, sys
          path = 'ohos/entry/src/main/module.json5'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          if 'ohos.permission.INTERNET' in content:
              print('⚠️ 网络权限已存在，跳过')
              sys.exit(0)
          perms = '''"requestPermissions": [
              { "name": "ohos.permission.INTERNET" },
              { "name": "ohos.permission.GET_NETWORK_INFO" }
            ],'''
          if '"requestPermissions"' in content:
              # 已有数组，在数组开头追加权限
              new_content = re.sub(
                  r'("requestPermissions"\s*:\s*\[)',
                  r'\1\n            { "name": "ohos.permission.INTERNET" },\n            { "name": "ohos.permission.GET_NETWORK_INFO" },',
                  content, count=1)
          else:
              # 无数组，在 "module": { 后插入
              new_content = re.sub(r'("module"\s*:\s*\{)', r'\1\n    ' + perms, content, count=1)
          if new_content == content:
              print('⚠️ 注入失败，module.json5 结构未识别')
              sys.exit(1)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(new_content)
          print('✅ 已注入网络权限')
          PYEOF
          echo "=== module.json5 ==="
          cat ohos/entry/src/main/module.json5

      - name: Update Version
        run: |
          export PATH="$HOME/ohos-flutter/bin:$PATH"
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}+${{ needs.prepare.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Relax Dart SDK Constraint
        # 鸿蒙 Flutter SDK 基于 3.27.4（Dart 3.6.2），项目要求 Dart >=3.12.0
        # CI 中临时放宽到 >=3.6.0，仅影响鸿蒙构建，不改动仓库 pubspec.yaml
        run: |
          sed -i "s/sdk: '>=3.12.0 <4.0.0'/sdk: '>=3.6.0 <4.0.0'/" pubspec.yaml
          echo "=== 放宽后的 SDK 约束 ==="
          grep "sdk:" pubspec.yaml

      - name: Install Dependencies
        run: |
          export PATH="$HOME/ohos-flutter/bin:$PATH"
          flutter pub get

      - name: Build HAP
        run: |
          export PATH="$HOME/ohos-flutter/bin:$PATH"
          flutter build hap --release

      - name: Rename HAP
        id: hap
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          HAP_NAME="mr_v${{ needs.prepare.outputs.version_compact }}_${TYPE}_${BUILD_DATE}_ohos.hap"
          # 兼容不同 SDK 版本的产物路径
          HAP_SRC=$(find build -name "*.hap" -type f | head -1)
          if [ -z "$HAP_SRC" ]; then
            echo "❌ 未找到 .hap 产物"
            find build -type f 2>/dev/null | head -20
            exit 1
          fi
          cp "$HAP_SRC" "${HAP_NAME}"
          echo "hap_name=${HAP_NAME}" >> $GITHUB_OUTPUT
          ls -lh "${HAP_NAME}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mr-ohos-${{ needs.prepare.outputs.version }}
          path: ${{ steps.hap.outputs.hap_name }}
          retention-days: 30

  # ===== 合并发布（等待所有平台，无论成功失败）=====
  release:
    name: Create Release
    needs: [prepare, build-android, build-ios, build-ohos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Check Build Results
        id: results
        run: |
          echo "android_result=${{ needs.build-android.result }}" >> $GITHUB_OUTPUT
          echo "ios_result=${{ needs.build-ios.result }}" >> $GITHUB_OUTPUT
          echo "ohos_result=${{ needs.build-ohos.result }}" >> $GITHUB_OUTPUT
          echo "=== 构建结果 ==="
          echo "Android: ${{ needs.build-android.result }}"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "HarmonyOS: ${{ needs.build-ohos.result }}"

      - name: Download Android Artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mr-android-${{ needs.prepare.outputs.version }}
          path: artifacts/android

      - name: Download iOS Artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mr-ios-${{ needs.prepare.outputs.version }}
          path: artifacts/ios

      - name: Download HarmonyOS Artifact
        if: needs.build-ohos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mr-ohos-${{ needs.prepare.outputs.version }}
          path: artifacts/ohos

      - name: List Artifacts
        run: |
          echo "=== Android ==="
          ls -lh artifacts/android/ 2>/dev/null || echo "无 Android 产物"
          echo "=== iOS ==="
          ls -lh artifacts/ios/ 2>/dev/null || echo "无 iOS 产物"
          echo "=== HarmonyOS ==="
          ls -lh artifacts/ohos/ 2>/dev/null || echo "无 HarmonyOS 产物"

      - name: Build Release Body
        id: body
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_COMPACT="${{ needs.prepare.outputs.version_compact }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          COMMIT_COUNT="${{ needs.prepare.outputs.commit_count }}"

          TYPE_LABEL="测试版 (dev)"
          if [ "$TYPE" = "stable" ]; then
            TYPE_LABEL="正式版 (stable)"
          fi

          BODY="## MR ${VERSION_COMPACT}\n\n"
          BODY="${BODY}**打包类型**: ${TYPE_LABEL}\n\n"
          BODY="${BODY}**构建日期**: ${BUILD_DATE}\n\n"
          BODY="${BODY}**版本号**: ${VERSION}（pubspec.yaml 格式）\n\n"
          BODY="${BODY}**构建号**: ${{ needs.prepare.outputs.build_number }}\n\n"
          BODY="${BODY}---\n\n"

          # Android 下载说明
          if [ "${{ needs.build-android.result }}" = "success" ]; then
            BODY="${BODY}### Android\n"
            BODY="${BODY}- \`.apk\` 文件直接安装\n"
            BODY="${BODY}- \`.zip\` 文件为压缩包，解压后安装\n"
            BODY="${BODY}- 安装方法：下载 APK → 允许未知来源 → 安装\n\n"
          else
            BODY="${BODY}### Android\n❌ 打包失败，请查看 Actions 日志\n\n"
          fi

          # iOS 下载说明
          if [ "${{ needs.build-ios.result }}" = "success" ]; then
            BODY="${BODY}### iOS\n"
            BODY="${BODY}- \`.ipa\` 文件需通过侧载工具安装（AltStore/Sideloadly/TrollStore）\n"
            BODY="${BODY}- 未签名版本，需自签或使用侧载工具\n"
            BODY="${BODY}- 安装方法：下载 IPA → 使用侧载工具安装\n\n"
          else
            BODY="${BODY}### iOS\n⚠️ 打包失败或暂不支持，请查看 Actions 日志\n\n"
          fi

          # 鸿蒙 HarmonyOS 下载说明
          if [ "${{ needs.build-ohos.result }}" = "success" ]; then
            BODY="${BODY}### HarmonyOS（鸿蒙）\n"
            BODY="${BODY}- \`.hap\` 文件为鸿蒙安装包\n"
            BODY="${BODY}- 安装方法：通过 hdc 工具安装 \`hdc install xxx.hap\`，或推送到设备后用文件管理器安装\n"
            BODY="${BODY}- 需在鸿蒙系统设置中允许未知来源应用安装\n\n"
          else
            BODY="${BODY}### HarmonyOS（鸿蒙）\n⚠️ 打包失败或暂不支持，请查看 Actions 日志\n"
            BODY="${BODY}（鸿蒙 Flutter SDK 当前基于 3.27.4，与项目 Dart 要求可能不兼容）\n\n"
          fi

          # 写入文件避免转义问题
          echo -e "$BODY" > release_body.md
          cat release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version_compact }}-${{ needs.prepare.outputs.release_type }}
          name: MR ${{ needs.prepare.outputs.version_compact }} (${{ needs.prepare.outputs.release_type == 'stable' && '正式版' || '测试版' }})
          body_path: release_body.md
          files: |
            artifacts/android/*
            artifacts/ios/*
            artifacts/ohos/*
          prerelease: ${{ needs.prepare.outputs.release_type != 'stable' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
