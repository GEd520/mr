name: Build & Release

# 触发条件：
# 1. push 到 master → 自动打包测试版（dev）
# 2. 手动触发 → 可选正式版(stable)或测试版(dev)
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_type:
        description: '打包类型'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stable

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: 'stable'
  JAVA_VERSION: '21'

jobs:
  # ===== 版本号计算（共享）=====
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_count: ${{ steps.version.outputs.commit_count }}
      build_date: ${{ steps.version.outputs.build_date }}
      release_type: ${{ steps.release_type.outputs.type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        run: |
          YY=$(date -u +%y)
          MMDD=$(date -u +%m%d)
          TODAY=$(date -u +%Y-%m-%d)
          COMMIT_COUNT_TODAY=$(git log --oneline --since="${TODAY}T00:00:00Z" --until="${TODAY}T23:59:59Z" | wc -l | tr -d ' ')
          if [ "$COMMIT_COUNT_TODAY" -eq 0 ]; then
            COMMIT_COUNT_TODAY=1
          fi
          VERSION="${YY}.${MMDD}.${COMMIT_COUNT_TODAY}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT_TODAY" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "=========================================="
          echo "  版本号: $VERSION"
          echo "  今日提交数: $COMMIT_COUNT_TODAY"
          echo "=========================================="

      - name: Determine Release Type
        id: release_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=dev" >> $GITHUB_OUTPUT
          fi

  # ===== Android APK 打包 + 独立发布 =====
  build-android:
    name: Build & Release Android
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Update Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}+${{ needs.prepare.outputs.commit_count }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Remove Aliyun Mirrors
        run: |
          sed -i '/maven.aliyun.com/d' android/settings.gradle.kts
          sed -i '/maven.aliyun.com/d' android/build.gradle.kts

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        id: apk
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          APK_NAME="mr_v${VERSION}_${TYPE}_${BUILD_DATE}_arm64.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${APK_NAME}"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "${APK_NAME}"

      - name: Compress APK
        run: |
          APK_NAME="${{ steps.apk.outputs.apk_name }}"
          ZIP_NAME="${APK_NAME%.apk}.zip"
          zip -j "${ZIP_NAME}" "${APK_NAME}"
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mr-android-${{ needs.prepare.outputs.version }}
          path: |
            ${{ steps.apk.outputs.apk_name }}
            ${{ env.zip_name }}
          retention-days: 30

      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.release_type }}-android
          name: MR ${{ needs.prepare.outputs.version }} Android (${{ needs.prepare.outputs.release_type == 'stable' && '正式版' || '测试版' }})
          body: |
            ## MR ${{ needs.prepare.outputs.version }} Android

            **打包类型**: ${{ needs.prepare.outputs.release_type == 'stable' && '正式版 (stable)' || '测试版 (dev)' }}

            **构建日期**: ${{ needs.prepare.outputs.build_date }}

            **今日提交数**: ${{ needs.prepare.outputs.commit_count }}

            **版本号规则**: YY.MMDD.今日提交数

            ---

            ### 下载说明
            - `.apk` 文件直接安装
            - `.zip` 文件为压缩包，解压后安装

            ### 安装方法
            1. 下载 APK 文件
            2. 允许"未知来源"安装
            3. 点击安装
          files: |
            ${{ steps.apk.outputs.apk_name }}
            ${{ env.zip_name }}
          prerelease: ${{ needs.prepare.outputs.release_type != 'stable' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== iOS 打包 + 独立发布（需要 macOS runner）=====
  build-ios:
    name: Build & Release iOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Update Version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i '' "s/^version:.*/version: ${VERSION}+${{ needs.prepare.outputs.commit_count }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create IPA
        id: ipa
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TYPE="${{ needs.prepare.outputs.release_type }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          IPA_NAME="mr_v${VERSION}_${TYPE}_${BUILD_DATE}_ios.ipa"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "${IPA_NAME}" Payload
          echo "ipa_name=${IPA_NAME}" >> $GITHUB_OUTPUT
          ls -lh "${IPA_NAME}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mr-ios-${{ needs.prepare.outputs.version }}
          path: ${{ steps.ipa.outputs.ipa_name }}
          retention-days: 30

      - name: Create iOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.release_type }}-ios
          name: MR ${{ needs.prepare.outputs.version }} iOS (${{ needs.prepare.outputs.release_type == 'stable' && '正式版' || '测试版' }})
          body: |
            ## MR ${{ needs.prepare.outputs.version }} iOS

            **打包类型**: ${{ needs.prepare.outputs.release_type == 'stable' && '正式版 (stable)' || '测试版 (dev)' }}

            **构建日期**: ${{ needs.prepare.outputs.build_date }}

            **今日提交数**: ${{ needs.prepare.outputs.commit_count }}

            **版本号规则**: YY.MMDD.今日提交数

            ---

            ### 下载说明
            - `.ipa` 文件需通过侧载工具安装（AltStore/Sideloadly/TrollStore）
            - 未签名版本，需自签或使用侧载工具

            ### 安装方法
            1. 下载 IPA 文件
            2. 使用侧载工具安装
          files: |
            ${{ steps.ipa.outputs.ipa_name }}
          prerelease: ${{ needs.prepare.outputs.release_type != 'stable' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
